services:
  - type: web
    name: nc-county-tracker
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard — source of truth is the Google Sheet,
      # not a local DB, so no Disk is needed for this service anymore.
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_TAB
        sync: false
